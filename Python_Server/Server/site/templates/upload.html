<!DOCTYPE html>
<html lang="{{ lang.language }}">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Map Share</title>
	<link rel="stylesheet" href="../static/css/Global1.css">
	<link rel="stylesheet" href="../static/css/Upload.css">
</head>
<body>
	<header>
		<h1>{{ lang.upload.upload_title }}</h1>
	</header>

	<nav>
		<ul>
			<li><a href="/">{{ lang.upload.return_home }}</a></li>
		</ul>
	</nav>

	<section>
		<h2>{{ lang.upload.upload_content }}</h2>
		<form id="form" action="/upload" method="POST" enctype="multipart/form-data">
			<label for="file">{{ lang.upload.select_file }}:</label>
			<input type="file" id="file" name="file" accept=".mp4,.mp3,.jpg,.jpeg,.png" required>

			<label for="title">{{ lang.upload.title }}:</label>
			<input type="text" id="title" name="title" required>
			
			<label for="description">{{ lang.upload.description }}:</label>
			<textarea id="description" name="description" rows="4" required></textarea>

			<div class="coordinates-group">
				<label for="latitude">{{ lang.upload.latitude }}:</label>
				<input type="number" id="latitude" name="latitude" required min="-180" max="180" step="0.0000001">

				<label for="longitude">{{ lang.upload.longitude }}:</label>
				<input type="number" id="longitude" name="longitude" required min="-180" max="180" step="0.0000001">
			</div>
			
			<button id="coords">{{ lang.upload.put_my_coords }}</button>

			<button type="submit">{{ lang.upload.upload }}</button>

			{% if lang.error_message %}
			<p id="p_error" class="error">{{ lang.error_message }}</p>
			{% endif %}
			
			{% if lang.info_message %}
			<p class="info">{{ lang.info_message }}</p>
			{% endif %}
			
		</form>
	</section>

	<script>
		document.getElementById("coords").addEventListener("click", function ()
		{
			if (navigator.geolocation)
			{
				navigator.geolocation.getCurrentPosition(function (position) {
						document.getElementById("latitude").value = position.coords.latitude;
						document.getElementById("longitude").value = position.coords.longitude;
				},
				function (error)
				{
					alert("Unable to retrieve your location. Please check location permissions.");
				});
			}
			else
				alert("Geolocation is not supported by your browser.");
		});

		
		const form = document.getElementById('form');
		form.addEventListener('submit', function (e)
		{
			const fileInput = document.getElementById('file');
			const file = fileInput.files[0];

			const allowedExtensions = ['mp4', 'mp3', 'jpg', 'jpeg', 'png'];
			const fileExtension = file.name.split('.').pop().toLowerCase();

			if (!allowedExtensions.includes(fileExtension))
			{
				alert("Invalid file!")
				e.preventDefault();
			}

		});

	</script>

</body>
</html>
